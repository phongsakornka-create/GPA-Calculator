<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เครื่องคำนวณเกรด</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>เครื่องคำนวณเกรด (GPA Calculator)</h1>

    <div class="form">
        <input type="text" id="subject" placeholder="ชื่อรายวิชา">

        <input type="number" id="credit" placeholder="หน่วยกิต" min="1">

        <select id="grade">
            <option value="4">A</option>
            <option value="3.5">B+</option>
            <option value="3">B</option>
            <option value="2.5">C+</option>
            <option value="2">C</option>
            <option value="1.5">D+</option>
            <option value="1">D</option>
            <option value="0">F</option>
        </select>

        <button id="addBtn">เพิ่มรายวิชา</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>วิชา</th>
                <th>หน่วยกิต</th>
                <th>เกรด</th>
                <th>ลบ</th>
            </tr>
        </thead>

        <tbody id="courseList">

        </tbody>
    </table>

    <button id="calculateBtn">คำนวณ GPA</button>

    <h2 id="result">GPA : 0.00</h2>

    <div class="footer-info">
        <p><strong>ผู้พัฒนา:</strong> นาย พงศกร แก้วจันทร์</p>
        <p><strong>วิชา:</strong> Select Topic Software</p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
